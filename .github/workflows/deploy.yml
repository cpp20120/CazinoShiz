name: Build and push image

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/casinoshiz

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-eco:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: roamiiing/eco
          token: ${{ secrets.ECO_DEPLOY_TOKEN }}

      - name: Update image tag
        run: |
          sed -i "s|tag: \".*\"|tag: \"${{ github.sha }}\"|" \
            _infrastructure/flux/clusters/single-node/production/casinoshiz/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _infrastructure/flux/clusters/single-node/production/casinoshiz/values.yaml
          git diff --staged --quiet || git commit -m "chore(casinoshiz): deploy ${{ github.sha }}"
          git push
