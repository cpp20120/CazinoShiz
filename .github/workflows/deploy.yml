name: Build and push image

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/casinoshiz

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in eco repo
        env:
          ECO_DEPLOY_TOKEN: ${{ secrets.ECO_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${ECO_DEPLOY_TOKEN}@github.com/cppshizoid/eco.git /tmp/eco
          cd /tmp/eco
          sed -i 's|tag: ".*"|tag: "${{ github.sha }}"|' \
            _infrastructure/flux/clusters/single-node/production/casinoshiz/values.yaml
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add _infrastructure/flux/clusters/single-node/production/casinoshiz/values.yaml
          git commit -m "chore: update casinoshiz image tag to ${{ github.sha }}"
          git push
